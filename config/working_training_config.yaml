# Working configuration that balances complexity with performance
game:
  num_players: 3  # Start with 3-player to reduce complexity
  small_blind: 50
  big_blind: 100
  starting_stack: 10000
  min_players: 3
  max_players: 3

training:
  iterations: 10000
  checkpoint_frequency: 2000
  evaluation_frequency: 5000
  parallel_workers: 4

abstraction:
  # Simpler but meaningful abstractions
  card_buckets:
    preflop: 50     # Reduced but still meaningful
    flop: 200       # Reasonable complexity
    turn: 300      
    river: 400     
  
  # Fewer action sizes to reduce complexity
  action_fractions: [0.5, 1.0, 2.0, 4.0]  # 4 bet sizes
  
  # Moderate hand evaluation settings
  hand_samples: 2000
  clustering_samples: 1000
  use_fast_eval: false

cfr:
  solver_type: "mccfr"  # Use MCCFR but with simpler game
  discount_factor: 0.95
  exploration_threshold: 0.4
  regret_matching_plus: true

evaluation:
  num_hands: 500
  num_opponents: 2